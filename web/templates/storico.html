<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storico — PerilCar ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --surface: #f7f8fa; --surface2: #eef0f4;
      --border: #dde1e8; --orange: #e94c00; --orange2: #ff6b35;
      --blue: #3a5bd9; --blue2: #5a7bf0;
      --green: #16a34a; --green2: #22c55e;
      --red: #dc2626; --text: #111827; --text2: #4b5563; --text3: #9ca3af;
      --radius: 8px; --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      font-size: 13.5px; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── TOPBAR ─────────────────────────────────────────────── */
    .topbar {
      height: 50px; flex-shrink: 0; background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .topbar-logo { font-weight: 700; font-size: 17px; }
    .topbar-logo span { color: var(--orange); }
    .nav-link {
      padding: 5px 12px; border-radius: 6px; font-size: 12.5px;
      font-weight: 500; text-decoration: none; color: var(--text2); transition: .15s;
    }
    .nav-link:hover { background: var(--surface2); }
    .nav-link.active { background: var(--orange); color: #fff; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .user-chip {
      font-size: 12px; color: var(--text2); background: var(--surface);
      border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px;
    }
    .btn-logout {
      font-size: 12px; padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: #fff;
      color: var(--text2); cursor: pointer; font-family: var(--font); transition: .15s;
    }
    .btn-logout:hover { background: #fee2e2; color: var(--red); }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .layout {
      display: grid; grid-template-columns: 240px 1fr;
      flex: 1; overflow: hidden;
    }

    /* ── SIDEBAR ANNI/MESI ───────────────────────────────────── */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 14px 0;
      display: flex; flex-direction: column; gap: 0;
    }
    .sidebar-title {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .8px;
      padding: 6px 16px 10px;
    }
    .anno-group { }
    .anno-btn {
      width: 100%; padding: 9px 16px; background: none; border: none;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font); font-size: 13.5px; font-weight: 700;
      color: var(--text); cursor: pointer; transition: background .12s;
    }
    .anno-btn:hover { background: var(--surface2); }
    .anno-btn.active { background: #fff3ee; color: var(--orange); }
    .anno-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }
    .anno-btn.open .anno-arrow { transform: rotate(90deg); }

    .mesi-list { display: none; }
    .mesi-list.open { display: block; }
    .mese-btn {
      width: 100%; padding: 7px 16px 7px 32px;
      background: none; border: none;
      font-family: var(--font); font-size: 12.5px;
      color: var(--text2); cursor: pointer; text-align: left;
      transition: background .12s; display: flex; align-items: center;
      justify-content: space-between;
    }
    .mese-btn:hover { background: var(--surface2); }
    .mese-btn.active { background: #fff3ee; color: var(--orange); font-weight: 600; }
    .mese-count {
      font-size: 10px; background: var(--surface2);
      color: var(--text3); padding: 1px 7px; border-radius: 10px;
    }
    .mese-btn.active .mese-count { background: #ffd0b5; color: var(--orange); }

    .sidebar-sep { border: none; border-top: 1px solid var(--border); margin: 8px 12px; }

    .filter-tutti {
      width: 100%; padding: 9px 16px; background: none; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--blue); cursor: pointer; text-align: left; transition: background .12s;
    }
    .filter-tutti:hover { background: var(--surface2); }
    .filter-tutti.active { background: #eff3ff; }

    /* ── COLONNA DESTRA ─────────────────────────────────────── */
    .main {
      display: flex; flex-direction: column;
      overflow: hidden; padding: 14px 16px 10px; gap: 10px;
    }

    /* Filtri veloci */
    .filters-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--font); transition: .15s;
    }
    .btn-ghost { background: #fff; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-blue  { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: var(--blue2); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { background: var(--orange2); }

    .tipo-filter {
      display: flex; gap: 4px;
    }
    .tipo-pill {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: #fff; color: var(--text2);
      cursor: pointer; transition: .15s; font-family: var(--font);
    }
    .tipo-pill:hover { border-color: var(--orange); color: var(--orange); }
    .tipo-pill.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .tipo-pill.carico.active  { background: var(--orange); border-color: var(--orange); }
    .tipo-pill.scarico.active { background: var(--green);  border-color: var(--green); color:#fff; }

    .searchbox {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0 10px; margin-left: auto;
    }
    .searchbox input {
      border: none; background: transparent; outline: none;
      font-family: var(--font); font-size: 13px; color: var(--text);
      width: 180px; padding: 7px 0;
    }

    /* Header periodo selezionato */
    .period-header {
      display: flex; align-items: center; gap: 10px;
    }
    .period-title { font-size: 18px; font-weight: 700; }
    .period-sub { font-size: 12px; color: var(--text3); }

    /* Tabella */
    .table-wrap {
      flex: 1; overflow: auto;
      border: 1px solid var(--border); border-radius: 10px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    thead th {
      position: sticky; top: 0; z-index: 5;
      background: var(--surface); color: var(--text2);
      font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: 9px 12px; text-align: left;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f3f4f6; transition: background .1s; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 7px 12px; font-size: 13px; white-space: nowrap; }

    .tipo-badge {
      display: inline-block; padding: 2px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .tipo-carico     { background: #fff3ee; color: var(--orange); border: 1px solid #ffd0b5; }
    .tipo-scarico    { background: #f0fdf4; color: var(--green);  border: 1px solid #bbf7d0; }
    .tipo-rettifica  { background: #fefce8; color: #ca8a04;       border: 1px solid #fde68a; }
    .tipo-inventario { background: #eff3ff; color: var(--blue);   border: 1px solid #c7d2fe; }

    .num { text-align: center; font-family: var(--mono); font-size: 12.5px; }
    .delta-pos { color: var(--green); font-weight: 700; }
    .delta-neg { color: var(--red);   font-weight: 700; }
    .cmp-chip {
      font-family: var(--mono); font-size: 11px;
      background: #fff3ee; color: var(--orange);
      border: 1px solid #ffd0b5; padding: 1px 7px; border-radius: 4px;
    }

    .status-bar {
      font-size: 11.5px; color: var(--text3); display: flex; gap: 16px; padding: 2px 0;
    }

    /* Raggruppamento per mese nella tabella */
    .group-header td {
      background: var(--surface); color: var(--text2);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      border-top: 2px solid var(--border);
    }

    #reload-badge {
      position: fixed; bottom: 14px; left: 14px; z-index: 9999;
      background: var(--green); color: #fff; padding: 5px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <span class="topbar-logo">Peril<span>Car</span></span>
  <nav style="display:flex;gap:4px;margin-left:12px">
    <a href="/dashboard" class="nav-link">🏠 Home</a>
    <a href="/magazzino" class="nav-link">📦 Magazzino</a>
    <a href="/storico"   class="nav-link active">📋 Storico</a>
  </nav>
  <div class="topbar-right">
    <span class="user-chip" id="user-chip">👤 —</span>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>
</header>

<div class="layout">

  <!-- ══ SIDEBAR ANNI/MESI ════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-title">📅 Periodo</div>

    <button class="filter-tutti active" id="btn-tutti" onclick="selTutti()">
      🗂 Tutti i movimenti
    </button>
    <hr class="sidebar-sep">

    <div id="albero-anni">
      <div style="padding:12px 16px;color:var(--text3);font-size:12px">Caricamento...</div>
    </div>
  </aside>

  <!-- ══ MAIN ═════════════════════════════════════════════════════ -->
  <div class="main">

    <!-- Filtri rapidi -->
    <div class="filters-bar">
      <div class="tipo-filter">
        <button class="tipo-pill active" id="f-tutti"   onclick="setTipo('')">Tutti</button>
        <button class="tipo-pill carico"  id="f-carico"  onclick="setTipo('carico')">↑ Carichi</button>
        <button class="tipo-pill scarico" id="f-scarico" onclick="setTipo('scarico')">↓ Scarichi</button>
        <button class="tipo-pill"         id="f-rett"    onclick="setTipo('rettifica')">⚡ Rettifiche</button>
      </div>
      <button class="btn btn-blue" onclick="caricaDati()">🔄 Aggiorna</button>
      <button class="btn btn-ghost" onclick="stampa()">🖨 Stampa</button>
      <div class="searchbox">
        <span style="color:var(--text3)">🔍</span>
        <input type="text" id="inp-cerca" placeholder="Cerca articolo..."
               oninput="filtraLocale()">
      </div>
    </div>

    <!-- Header periodo -->
    <div class="period-header">
      <span class="period-title" id="period-title">📋 Tutti i movimenti</span>
      <span class="period-sub" id="period-sub"></span>
    </div>

    <!-- Tabella -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Data / Ora</th>
            <th>CMP</th>
            <th>Articolo</th>
            <th>Tipo</th>
            <th class="num">Qtà</th>
            <th class="num">Prima</th>
            <th class="num">Dopo</th>
            <th class="num">Δ</th>
            <th>Riferimento</th>
            <th>Note</th>
            <th>Utente</th>
          </tr>
        </thead>
        <tbody id="stor-tbody">
          <tr><td colspan="12" style="text-align:center;padding:40px;color:var(--text3)">
            ⏳ Caricamento...
          </td></tr>
        </tbody>
      </table>
    </div>

    <div class="status-bar">
      <span id="s-count">— movimenti</span>
      <span id="s-carichi"  style="color:var(--orange)"></span>
      <span id="s-scarichi" style="color:var(--green)"></span>
    </div>
  </div>
</div>

<div id="reload-badge">🔄 Hot reload</div>

<script>
// ── HOT RELOAD ───────────────────────────────────────────────────────
const _sock = io();
_sock.on('reload', d => {
  const b = document.getElementById('reload-badge');
  b.style.opacity = '1'; b.textContent = '🔄 ' + (d.file||'');
  setTimeout(()=>window.location.reload(), 400);
});

// ── STATO ────────────────────────────────────────────────────────────
let _anno  = null;
let _mese  = null;
let _tipo  = '';
let _dati  = [];      // tutti i movimenti caricati
let _filt  = [];      // dopo filtro testo locale

const MESI_IT = ['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                 'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// ── UTILS ────────────────────────────────────────────────────────────
async function apiFetch(url, opts={}) {
  opts.headers = {'Content-Type':'application/json',...(opts.headers||{})};
  const r = await fetch(url, opts);
  return r.json();
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function logout() {
  await apiFetch('/api/logout',{method:'POST'});
  window.location.href='/login';
}

// ── ALBERO ANNI/MESI ─────────────────────────────────────────────────
async function caricaAlbero() {
  const tree = await apiFetch('/api/magazzino/movimenti/albero');
  const div  = document.getElementById('albero-anni');

  if(!Object.keys(tree).length) {
    div.innerHTML = '<div style="padding:12px 16px;color:var(--text3);font-size:12px">Nessun movimento</div>';
    return;
  }

  div.innerHTML = Object.entries(tree).map(([anno, mesi]) => `
    <div class="anno-group" id="ag-${anno}">
      <button class="anno-btn" id="ab-${anno}" onclick="toggleAnno('${anno}')">
        <span>📅 ${anno}</span>
        <span class="anno-arrow">▶</span>
      </button>
      <div class="mesi-list" id="ml-${anno}">
        ${mesi.map(m => `
          <button class="mese-btn" id="mb-${anno}-${m}"
                  onclick="selMese('${anno}','${m}')">
            <span>${MESI_IT[parseInt(m)]}</span>
            <span class="mese-count" id="mc-${anno}-${m}">—</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Apri l'anno corrente di default
  const annoCorrente = new Date().getFullYear().toString();
  if(tree[annoCorrente]) toggleAnno(annoCorrente);
}

function toggleAnno(anno) {
  const btn = document.getElementById('ab-'+anno);
  const list = document.getElementById('ml-'+anno);
  const isOpen = list.classList.contains('open');
  // Chiudi tutti
  document.querySelectorAll('.mesi-list').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.anno-btn').forEach(el=>el.classList.remove('open'));
  if(!isOpen) {
    list.classList.add('open');
    btn.classList.add('open');
  }
}

async function selAnno(anno) {
  _anno = anno; _mese = null;
  aggiornaUI();
  document.getElementById('period-title').textContent = `📅 Anno ${anno}`;
  document.getElementById('period-sub').textContent = '';
  // Evidenzia
  document.querySelectorAll('.anno-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mese-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ab-'+anno)?.classList.add('active');
  document.getElementById('btn-tutti').classList.remove('active');
  await caricaDati();
}

async function selMese(anno, mese) {
  _anno = anno; _mese = mese;
  aggiornaUI();
  const nomeMese = MESI_IT[parseInt(mese)];
  document.getElementById('period-title').textContent = `📅 ${nomeMese} ${anno}`;
  document.getElementById('period-sub').textContent = '';
  // Evidenzia
  document.querySelectorAll('.anno-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mese-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`mb-${anno}-${mese}`)?.classList.add('active');
  document.getElementById('btn-tutti').classList.remove('active');
  await caricaDati();
}

async function selTutti() {
  _anno = null; _mese = null;
  document.getElementById('period-title').textContent = '📋 Tutti i movimenti';
  document.getElementById('period-sub').textContent = '';
  document.querySelectorAll('.anno-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mese-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-tutti').classList.add('active');
  await caricaDati();
}

function aggiornaUI() {
  document.getElementById('btn-tutti').classList.remove('active');
}

// ── TIPO FILTER ──────────────────────────────────────────────────────
function setTipo(t) {
  _tipo = t;
  ['tutti','carico','scarico','rett'].forEach(id => {
    document.getElementById('f-'+id).classList.remove('active');
  });
  if(t==='') document.getElementById('f-tutti').classList.add('active');
  else if(t==='carico')    document.getElementById('f-carico').classList.add('active');
  else if(t==='scarico')   document.getElementById('f-scarico').classList.add('active');
  else if(t==='rettifica') document.getElementById('f-rett').classList.add('active');
  caricaDati();
}

// ── CARICA DATI ──────────────────────────────────────────────────────
async function caricaDati() {
  // Leggi anche componente_id da URL se presente
  const urlComp = new URLSearchParams(window.location.search).get('comp');

  const p = new URLSearchParams();
  if(_anno) p.set('anno', _anno);
  if(_mese) p.set('mese', _mese);
  if(_tipo) p.set('tipo', _tipo);
  if(urlComp) p.set('componente_id', urlComp);

  document.getElementById('stor-tbody').innerHTML =
    `<tr><td colspan="12" style="text-align:center;padding:30px;color:var(--text3)">
    ⏳ Caricamento...</td></tr>`;

  _dati = await apiFetch('/api/magazzino/movimenti?'+p.toString());
  _filt = _dati;

  // Aggiorna titolo con count
  document.getElementById('period-sub').textContent = `${_dati.length} movimenti`;

  filtraLocale();
}

// ── FILTRO TESTO LOCALE (senza API) ─────────────────────────────────
function filtraLocale() {
  const q = document.getElementById('inp-cerca').value.trim().toLowerCase();
  _filt = q ? _dati.filter(r =>
    (r.articolo||'').toLowerCase().includes(q) ||
    (r.cmp||'').toLowerCase().includes(q) ||
    (r.riferimento||'').toLowerCase().includes(q)
  ) : _dati;
  renderTabella(_filt);
}

// ── RENDER ───────────────────────────────────────────────────────────
function renderTabella(data) {
  const tbody = document.getElementById('stor-tbody');
  if(!data.length) {
    tbody.innerHTML=`<tr><td colspan="12"
      style="text-align:center;padding:40px;color:var(--text3)">
      Nessun movimento trovato</td></tr>`;
    updateStatus(0,0,0); return;
  }

  let nc=0, ns=0;
  let html='';
  let lastGruppo = '';

  data.forEach(m => {
    // Raggruppa per mese (solo quando vediamo tutto o per anno)
    if(!_mese) {
      const gruppoKey = m.creato_il ? m.creato_il.slice(0,7) : '';
      if(gruppoKey !== lastGruppo) {
        lastGruppo = gruppoKey;
        const [a,me] = gruppoKey.split('-');
        const nome = MESI_IT[parseInt(me)] || me;
        html += `<tr class="group-header">
          <td colspan="12">📅 ${nome} ${a}</td>
        </tr>`;
      }
    }

    const delta  = (m.quantita_dopo||0) - (m.quantita_prima||0);
    const dClass = delta>=0 ? 'delta-pos' : 'delta-neg';
    const dSign  = delta>=0 ? '+' : '';
    if(m.tipo==='carico')  nc++;
    if(m.tipo==='scarico') ns++;

    html += `<tr>
      <td style="color:var(--text3);font-size:11px">${m.id}</td>
      <td style="color:var(--text2);font-family:var(--mono);font-size:12px">
        ${(m.creato_il||'').slice(0,19).replace('T',' ')}</td>
      <td><span class="cmp-chip">${esc(m.cmp||'')}</span></td>
      <td style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis">
        ${esc(m.articolo||'')}</td>
      <td><span class="tipo-badge tipo-${m.tipo}">${m.tipo}</span></td>
      <td class="num" style="font-weight:700">${m.quantita}</td>
      <td class="num" style="color:var(--text3)">${m.quantita_prima||0}</td>
      <td class="num" style="color:var(--text3)">${m.quantita_dopo||0}</td>
      <td class="num ${dClass}">${dSign}${delta}</td>
      <td style="color:var(--text2);font-size:12px">${esc(m.riferimento||'—')}</td>
      <td style="color:var(--text3);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">
        ${esc(m.note||'')}</td>
      <td style="font-size:12px">${esc(m.username||'—')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  updateStatus(data.length, nc, ns);
}

function updateStatus(tot, nc, ns) {
  document.getElementById('s-count').textContent   = `${tot} movimenti`;
  document.getElementById('s-carichi').textContent  = nc  ? `↑ ${nc} carichi`  : '';
  document.getElementById('s-scarichi').textContent = ns  ? `↓ ${ns} scarichi` : '';
}

// ── STAMPA ───────────────────────────────────────────────────────────
function stampa() {
  const titolo = document.getElementById('period-title').textContent;
  const rows   = _filt.map(m => {
    const delta = (m.quantita_dopo||0) - (m.quantita_prima||0);
    return `<tr>
      <td>${(m.creato_il||'').slice(0,19).replace('T',' ')}</td>
      <td>${esc(m.cmp||'')}</td>
      <td>${esc(m.articolo||'')}</td>
      <td>${m.tipo}</td>
      <td style="text-align:center">${m.quantita}</td>
      <td style="text-align:center">${m.quantita_prima||0}</td>
      <td style="text-align:center">${m.quantita_dopo||0}</td>
      <td style="text-align:center">${delta>=0?'+':''}${delta}</td>
      <td>${esc(m.riferimento||'')}</td>
      <td>${esc(m.username||'')}</td>
    </tr>`;
  }).join('');

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8"><title>Storico PerilCar</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:10px;margin:15px}
      h2{color:#e94c00;margin-bottom:4px}
      p{color:#888;margin-bottom:10px;font-size:10px}
      table{width:100%;border-collapse:collapse}
      th{background:#e94c00;color:white;padding:5px 8px;text-align:left;font-size:9px;text-transform:uppercase}
      td{padding:4px 8px;border-bottom:1px solid #eee;font-size:10px}
      tr:nth-child(even){background:#fafafa}
      @media print{@page{margin:.8cm;size:landscape}}
    </style></head><body>
    <h2>${esc(titolo)}</h2>
    <p>Generato il ${new Date().toLocaleString('it-IT')} · ${_filt.length} movimenti</p>
    <table><thead><tr>
      <th>Data/Ora</th><th>CMP</th><th>Articolo</th><th>Tipo</th>
      <th>Qtà</th><th>Prima</th><th>Dopo</th><th>Δ</th>
      <th>Riferimento</th><th>Utente</th>
    </tr></thead><tbody>${rows}</tbody></table>
    <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  w.document.close();
}

// ── INIT ─────────────────────────────────────────────────────────────
(async () => {
  // Imposta user chip
  try {
    const r = await fetch('/api/magazzino/stats');
    if(r.status===401) { window.location.href='/login'; return; }
  } catch(e) {}

  // Leggi componente da URL
  const urlComp = new URLSearchParams(window.location.search).get('comp');
  if(urlComp) {
    document.getElementById('period-title').textContent = `📋 Movimenti componente #${urlComp}`;
  }

  await caricaAlbero();
  await caricaDati();
})();
</script>
