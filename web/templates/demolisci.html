<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scheda Demolizione — PerilCar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#fff;--border:#dde1e8;
  --orange:#e94c00;--purple:#7c3aed;--green:#16a34a;--red:#dc2626;--blue:#3a5bd9;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --radius:8px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.topbar{height:50px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:700;font-size:17px}.topbar-logo span{color:var(--orange)}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);white-space:nowrap}
.btn-ghost{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{opacity:.9}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}

.page{max-width:1100px;margin:0 auto;padding:24px 16px}

/* BANNER */
.banner{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:24px;box-shadow:var(--shadow)}
.banner-title{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.banner-grid{display:grid;grid-template-columns:200px 1fr 1fr 1fr;gap:16px;align-items:end}
.b-field{display:flex;flex-direction:column;gap:4px}
.b-field label{font-size:10.5px;font-weight:600;color:var(--text2)}
.b-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text)}
.b-val.orange{color:var(--orange)}
.b-val.green{color:var(--green)}
.b-val.purple{color:var(--purple)}
.b-unit{font-size:11px;color:var(--text3);font-weight:400}
input[type=date]{font-family:var(--font);font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);outline:none;width:100%}
input[type=date]:focus{border-color:var(--blue)}

/* AUTO SELEZIONATE */
.auto-strip{background:#fff7f4;border:1px solid #ffd0b5;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:11px;color:var(--orange);font-weight:600}
.auto-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.auto-chip{background:#fff;border:1px solid #ffd0b5;border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text2)}

/* TABELLA MATERIALI */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.card-hdr h3{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid #f3f4f6}
tbody tr:last-child{border-bottom:none}
tbody td{padding:7px 8px;font-size:12px;vertical-align:middle}
tbody tr:hover{background:#fafafa}
tbody tr.locked{background:#fafafa}
tbody tr.locked td input{background:var(--bg);color:var(--text2)}

td input[type=text],td input[type=number]{
  width:100%;padding:5px 8px;border:1px solid transparent;border-radius:6px;
  font-family:var(--font);font-size:12px;color:var(--text);background:transparent;outline:none}
td input[type=text]:focus,td input[type=number]:focus{border-color:var(--blue);background:#fff}
td input[readonly]{color:var(--text3);cursor:default}
.n-chip{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:24px;flex-shrink:0}
.perc-wrap{position:relative;display:flex;align-items:center}
.perc-wrap input{width:70px;text-align:center;font-family:var(--mono);font-size:12px}
.perc-wrap span{position:absolute;right:8px;font-size:11px;color:var(--text3)}
td.ta-right{text-align:right;font-family:var(--mono)}
td.ta-center{text-align:center}

.btn-row-act{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.btn-edit{background:#eff6ff;color:var(--blue)}
.btn-lock{background:#f0fdf4;color:var(--green)}
.btn-del-row{background:#fee2e2;color:var(--red)}
.btn-edit:hover{background:var(--blue);color:#fff}
.btn-lock:hover{background:var(--green);color:#fff}
.btn-del-row:hover{background:var(--red);color:#fff}

.footer-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:var(--bg)}
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.tok{background:#fff;color:var(--green);border:1px solid #bbf7d0}
.terr{background:#fff;color:var(--red);border:1px solid #fca5a5}

@media print {
  .topbar,.footer-row,.btn,.btn-row-act,.auto-strip,
  .card-hdr button, #btn-aggiungi{display:none!important}
  body{background:#fff;font-size:11px}
  .page{padding:0;max-width:100%}
  .banner,.card{box-shadow:none;border:none;border-radius:0;margin:0;padding:0}
  .banner-grid{display:none}
  .card-hdr{display:none}
  #print-area{display:block!important}
  .table-main{display:none!important}
}
#print-area{display:none}
</style>
</head>
<body>
<header class="topbar">
  <span class="topbar-logo">Peril<span>Car</span></span>
  <span style="font-size:12px;color:var(--text3)">&#8250;</span>
  <a href="/demolizioni" style="font-size:13px;font-weight:600;color:var(--text2);text-decoration:none">Demolizioni</a>
  <span style="font-size:12px;color:var(--text3)">&#8250;</span>
  <span style="font-size:13px;font-weight:700;color:var(--purple)">Scheda Demolizione</span>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="stampa()">&#128438; Stampa</button>
    <button class="btn btn-ghost" onclick="window.location.href='/demolizioni'">&#8592; Torna</button>
  </div>
</header>

<div class="page">

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-title">&#9881; Scheda di Demolizione</div>
    <div class="banner-grid" style="grid-template-columns:180px 180px 1fr 1fr 1fr">
      <div class="b-field">
        <label>Data trattamento</label>
        <input type="date" id="b-data">
      </div>
      <div class="b-field">
        <label>Periodo</label>
        <div id="b-periodo" style="font-size:11px;color:var(--text2);line-height:1.6;margin-top:4px"></div>
      </div>
      <div class="b-field">
        <label>Peso Effettivo Totale</label>
        <div class="b-val orange" id="b-eff">0,00 <span class="b-unit">Kg</span></div>
      </div>
      <div class="b-field">
        <label>Peso Ricambi Sottratti</label>
        <div class="b-val green" id="b-ric">0,00 <span class="b-unit">Kg</span></div>
      </div>
      <div class="b-field">
        <label>Peso Netto da Smaltire</label>
        <div class="b-val purple" id="b-netto">0,00 <span class="b-unit">Kg</span></div>
      </div>
    </div>
  </div>

  <!-- INFO 1° TRATTAMENTO -->
  <div id="info-primo" style="display:none;background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px 16px;margin-bottom:12px;font-size:12px;color:#92400e"></div>

  <!-- AUTO -->
  <div class="auto-strip" id="auto-strip" style="display:none">
    <div>&#128663; Veicoli demoliti: <span id="n-auto">0</span></div>
    <div class="auto-chips" id="auto-chips"></div>
  </div>

  <!-- TABELLA MATERIALI -->
  <div class="card">
    <div class="card-hdr">
      <h3>&#128203; Elenco Materiali da Smaltire</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" onclick="aggiungiRiga()">+ Aggiungi riga</button>
        <button class="btn btn-purple" onclick="salvaScheda()" id="btn-salva">&#128190; Salva nel DB</button>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:36px"></th>
        <th style="width:100px">Codice</th>
        <th>Descrizione</th>
        <th style="width:110px;text-align:center">Percentuale (%)</th>
        <th style="width:130px;text-align:right">Q.tà Calcolata (Kg)</th>
        <th style="width:130px;text-align:right">Q.tà da Smaltire (Kg)</th>
        <th style="width:140px">Classi di Pericolosità</th>
        <th style="width:100px;text-align:center">N. Albatros</th>
        <th style="width:90px;text-align:center">Azioni</th>
      </tr></thead>
      <tbody id="mat-tbody"></tbody>
    </table>
    <div class="footer-row">
      <span style="font-size:12px;color:var(--text2)">Totale Q.tà da smaltire:</span>
      <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--purple)" id="tot-smaltire">0,00 Kg</span>
    </div>
  </div>
</div>

<script>
var _payload = null;
var _righe = [];
var _nextId = 1;
var _schedaId = null;

function fmt(n) { return parseFloat(n||0).toFixed(2).replace('.',','); }

function toast(msg, ok) {
  document.querySelectorAll('.toast').forEach(function(e){ e.remove(); });
  var d=document.createElement('div');
  d.className='toast '+(ok!==false?'tok':'terr');
  d.textContent=msg; document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 3000);
}

async function init() {
  // Leggi payload da sessionStorage
  var raw = sessionStorage.getItem('demolisci_payload') || localStorage.getItem('demolisci_payload');
  if(!raw) { document.body.innerHTML='<div style="padding:40px;text-align:center;color:#9ca3af">Nessuna demolizione selezionata. <a href="/demolizioni">Torna</a></div>'; return; }
  _payload = JSON.parse(raw);

  // Data odierna
  document.getElementById('b-data').value = _payload.data;

  // Separazione complete / 1° trattamento
  var _VOCI_PRIMO = ['130208','150202','160107','160112','160114','160113','160601'];
  window._VOCI_PRIMO = _VOCI_PRIMO;

  // Info banner 1° trattamento
  var nPrimo = (_payload.demolizioniPrimoTratt||[]).length;
  var nComplete = (_payload.demolizioniComplete||[]).length;
  if(nPrimo > 0) {
    var infoBanner = document.getElementById('info-primo');
    if(infoBanner) {
      infoBanner.style.display='';
      infoBanner.innerHTML = '&#9888; <b>'+nPrimo+' demolizione/i con 1° Trattamento</b>: verranno calcolate solo le 7 voci speciali (batterie, oli, assorbenti, filtri, pastiglie, liquidi antigelo, liquido freni). &nbsp;|&nbsp; <b>'+nComplete+' trattamenti completi</b>.';
    }
  }

  // Periodo dal/al (prima e ultima demolizione selezionata)
  var dems = _payload.demolizioni || [];
  if(dems.length > 0) {
    dems.sort(function(a,b){ return (a.data_presa_in_carico||'') > (b.data_presa_in_carico||'') ? 1 : -1; });
    var prima = dems[0];
    var ultima = dems[dems.length-1];
    var fmtData = function(d){ return d ? d.slice(0,10).split('-').reverse().join('/') : '—'; };
    var periodoHtml =
      'Dal <b>'+fmtData(prima.data_presa_in_carico)+'</b> n.p. <b>'+(prima.pag_reg||'—')+'</b><br>'
      +'Al <b>'+fmtData(ultima.data_presa_in_carico)+'</b> n.p. <b>'+(ultima.pag_reg||'—')+'</b>';
    document.getElementById('b-periodo').innerHTML = periodoHtml;
  }

  // Banner pesi
  document.getElementById('b-eff').innerHTML   = fmt(_payload.pesoEffTot)   + ' <span class="b-unit">Kg</span>';
  document.getElementById('b-ric').innerHTML   = fmt(_payload.ricambiTot)   + ' <span class="b-unit">Kg</span>';
  document.getElementById('b-netto').innerHTML = fmt(_payload.pesoNettoTot) + ' <span class="b-unit">Kg</span>';

  // Auto chips
  var chips = document.getElementById('auto-chips');
  var nAuto = 0;
  _payload.demolizioni.forEach(function(d){
    if(d.veicolo_str) {
      var chip = document.createElement('span');
      chip.className = 'auto-chip';
      chip.textContent = d.veicolo_str + ' (Reg.' + (d.reg_demolitori||'') + ' p.' + (d.pag_reg||'') + ')';
      chips.appendChild(chip);
      nAuto++;
    }
  });
  document.getElementById('n-auto').textContent = nAuto || _payload.demolizioni.length;
  document.getElementById('auto-strip').style.display = '';

  // Calcola chiave dem_ids
  var _demIds = (_payload.demolizioni||[]).map(function(d){return d.id;}).sort(function(a,b){return a-b;}).join(',');
  window._demIds = _demIds;

  // Prova a caricare scheda salvata dal DB; fallback su sessionStorage; altrimenti defaults
  var dbLoaded = false;
  try {
    var dbRes = await fetch('/api/schede-demolizione/' + encodeURIComponent(_demIds));
    var dbData = await dbRes.json();
    if(dbData.ok && dbData.found && dbData.data && dbData.data.righe_json) {
      _righe = JSON.parse(dbData.data.righe_json);
      _nextId = _righe.reduce(function(m,r){ return Math.max(m,r.id); },0)+1;
      _schedaId = dbData.data.id;
      dbLoaded = true;
      toast('\u{1F4BE} Scheda caricata dal database');
    }
  } catch(e) { /* ignora, usa fallback */ }

  // Carica righe salvate o crea 16 vuote
  var saved = !dbLoaded && (sessionStorage.getItem('demolisci_righe') || localStorage.getItem('demolisci_righe'));
  if(saved) {
    _righe = JSON.parse(saved);
    _nextId = _righe.reduce(function(m,r){ return Math.max(m,r.id); },0)+1;
  } else if(!dbLoaded) {
    var defaults = [
      {codice:'130208', descrizione:'Oli per motori, ingranaggi e lubrificazioni'},
      {codice:'150202', descrizione:'Assorbenti, materiali filtranti, stracci, ecc.'},
      {codice:'160103', descrizione:'Pneumatici fuori uso'},
      {codice:'160106', descrizione:'Carcasse bonificate'},
      {codice:"160107", descrizione:"Filtri dell'olio"},
      {codice:'160112', descrizione:'Pastiglie per freni e frizione'},
      {codice:'160114', descrizione:'Liquidi antigelo contenenti sostanze pericolose'},
      {codice:'160117', descrizione:'Metalli ferrosi'},
      {codice:'160119', descrizione:'Plastica'},
      {codice:'160120', descrizione:'Vetro'},
      {codice:'160122', descrizione:'Componenti non specificati altrimenti (imbott)'},
      {codice:'160601', descrizione:'Batterie al piombo'},
      {codice:'160122', descrizione:'Componenti non specificati altrimenti (fili)'},
      {codice:'160122', descrizione:'Componenti non specificati altrimenti (motori bonificati)'},
      {codice:'160113', descrizione:'Liquido per freni'},
      {codice:'160118', descrizione:'Metalli non ferrosi'}
    ];
    defaults.forEach(function(d){
      _righe.push({id:_nextId++, codice:d.codice, descrizione:d.descrizione, percentuale:'', qtaSmaltire:'', destinazione:'', pericolosita:_leggiPericolosita(d.codice), albatros:'', locked:true});
    });
  }
  renderTabella();
}

function aggiungiRiga(silent) {
  _righe.push({id:_nextId++, codice:'', descrizione:'', percentuale:'', qtaSmaltire:'', destinazione:'', pericolosita:'', albatros:'', locked:false});
  if(!silent) renderTabella();
}

function isVoceAmmessa(codice) {
  // Se ci sono SOLO demolizioni con 1° trattamento, filtra le voci
  var p = _payload || {};
  var nComplete = (p.demolizioniComplete||[]).length;
  var nPrimo    = (p.demolizioniPrimoTratt||[]).length;
  if(nPrimo > 0 && nComplete === 0) {
    // Solo 1° trattamenti: mostra solo le 7 voci
    return (window._VOCI_PRIMO||[]).indexOf(codice) !== -1;
  }
  return true; // Misto o solo completi: mostra tutto
}

function renderTabella() {
  var tbody = document.getElementById('mat-tbody');
  tbody.innerHTML = '';
  _righe.forEach(function(r, idx) {
    var tr = document.createElement('tr');
    tr.className = r.locked ? 'locked' : '';
    tr.id = 'tr-'+r.id;
    // Nascondi righe non ammesse per 1° trattamento
    if(!isVoceAmmessa(r.codice)) {
      tr.style.display='none';
      tr.style.opacity='0.3';
    }

    var pesoNetto = parseFloat((_payload && _payload.pesoNettoTot)||0);
    var perc = parseFloat(r.percentuale)||0;
    var qtaCalc = perc>0 ? (pesoNetto * perc / 100) : 0;

    var ro = r.locked ? ' readonly' : '';
    var roSmaltire = (r.locked && r.qtaSmaltire!=='') ? ' readonly' : '';

    tr.innerHTML =
      '<td class="ta-center"><span class="n-chip">'+(idx+1)+'</span></td>'
      +'<td><input type="text" value="'+esc(r.codice)+'" placeholder="Cod."'+ro
        +' onchange="aggiornaCampo('+r.id+',\'codice\',this.value)"></td>'
      +'<td><input type="text" value="'+esc(r.descrizione)+'" placeholder="Descrizione materiale"'+ro
        +' onchange="aggiornaCampo('+r.id+',\'descrizione\',this.value)"></td>'
      +'<td class="ta-center"><div class="perc-wrap">'
        +'<input type="number" value="'+(r.percentuale||'')+'" placeholder="0" step="0.01" min="0" max="100"'
        +' oninput="aggiornaCampo('+r.id+',\'percentuale\',this.value); ricalcola('+r.id+')">'
        +'<span>%</span></div></td>'
      +'<td class="ta-right" id="calc-'+r.id+'" style="font-family:var(--mono);color:var(--text2)">'
        +(qtaCalc>0 ? fmt(qtaCalc) : '&mdash;')+'</td>'
      +'<td><input type="number" value="'+(r.qtaSmaltire!==''&&r.qtaSmaltire!==undefined ? r.qtaSmaltire : (qtaCalc>0?qtaCalc.toFixed(2):''))+'" placeholder="0.00" step="0.01" min="0"'
        +' oninput="aggiornaCampo('+r.id+',\'qtaSmaltire\',this.value); aggiornaTotale()"></td>'
      
      +'<td><input type="text" value="'+esc(r.pericolosita||_leggiPericolosita(r.codice))+'" placeholder="es. HP14"'
        +' onchange="aggiornaCampo('+r.id+',\'pericolosita\',this.value); _salvaPericolosita('+r.id+')"></td>'
      +'<td class="ta-center"><input type="text" value="'+esc(r.albatros||'')+'" placeholder="es. 547"'
        +' style="text-align:center;font-family:var(--mono)" onchange="aggiornaCampo('+r.id+',\'albatros\',this.value)"></td>'
      +'<td class="ta-center"><div style="display:flex;gap:4px;justify-content:center">'
        +(r.locked
          ? '<button class="btn-row-act btn-edit" onclick="sblocca('+r.id+')" title="Modifica">&#9998;</button>'
          : '<button class="btn-row-act btn-lock" onclick="blocca('+r.id+')" title="Conferma">&#10003;</button>')
        +'<button class="btn-row-act btn-del-row" onclick="eliminaRiga('+r.id+')" title="Elimina">&#215;</button>'
      +'</div></td>';

    tbody.appendChild(tr);
  });
  aggiornaTotale();
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function aggiornaCampo(id, campo, val) {
  for(var i=0;i<_righe.length;i++){
    if(_righe[i].id===id){
      _righe[i][campo]=val;
      // Se è pericolosita, salvala per questo codice
      if(campo==='pericolosita' && _righe[i].codice && val){
        _salvaPericByRiga(_righe[i]);
      }
      break;
    }
  }
}

// ── Persistenza classe pericolosità per codice EER ────────────────────
var PERIC_KEY = 'demolisci_pericolosita';
function _pericolosita_map(){
  try{ return JSON.parse(localStorage.getItem(PERIC_KEY)||'{}'); }
  catch(e){ return {}; }
}
function _leggiPericolosita(codice){
  if(!codice) return '';
  return _pericolosita_map()[codice]||'';
}
function _salvaPericByRiga(riga){
  if(!riga.codice||!riga.pericolosita) return;
  var m = _pericolosita_map();
  m[riga.codice] = riga.pericolosita;
  try{ localStorage.setItem(PERIC_KEY, JSON.stringify(m)); }catch(e){}
}
function _salvaPericolosita(id){
  for(var i=0;i<_righe.length;i++){
    if(_righe[i].id===id){ _salvaPericByRiga(_righe[i]); break; }
  }
}

function ricalcola(id) {
  var pesoNetto = parseFloat((_payload && _payload.pesoNettoTot)||0);
  for(var i=0;i<_righe.length;i++){
    if(_righe[i].id===id){
      var perc = parseFloat(_righe[i].percentuale)||0;
      var qtaCalc = perc>0 ? (pesoNetto * perc / 100) : 0;
      var el = document.getElementById('calc-'+id);
      if(el) el.textContent = qtaCalc>0 ? fmt(qtaCalc) : '\u2014';
      break;
    }
  }
}

function aggiornaTotale() {
  var tot = 0;
  _righe.forEach(function(r){ tot += parseFloat(r.qtaSmaltire)||0; });
  document.getElementById('tot-smaltire').textContent = fmt(tot) + ' Kg';
}

function blocca(id) {
  // Leggi i valori attuali prima di bloccare
  var tr = document.getElementById('tr-'+id);
  if(tr) {
    var inputs = tr.querySelectorAll('input');
    for(var i=0;i<_righe.length;i++){
      if(_righe[i].id===id){
        // Prende i valori dai campi visibili
        _righe[i].codice       = inputs[0] ? inputs[0].value : _righe[i].codice;
        _righe[i].descrizione  = inputs[1] ? inputs[1].value : _righe[i].descrizione;
        _righe[i].percentuale  = inputs[2] ? inputs[2].value : _righe[i].percentuale;
        _righe[i].qtaSmaltire  = inputs[3] ? inputs[3].value : _righe[i].qtaSmaltire;
        _righe[i].destinazione = inputs[4] ? inputs[4].value : _righe[i].destinazione;
        _righe[i].pericolosita = inputs[5] ? inputs[5].value : _righe[i].pericolosita;
        _righe[i].albatros     = inputs[6] ? inputs[6].value : _righe[i].albatros;
        _righe[i].locked = true;
        break;
      }
    }
  }
  renderTabella();
}

function sblocca(id) {
  for(var i=0;i<_righe.length;i++){
    if(_righe[i].id===id){ _righe[i].locked=false; break; }
  }
  renderTabella();
}

function eliminaRiga(id) {
  _righe = _righe.filter(function(r){ return r.id!==id; });
  renderTabella();
}

async function salvaScheda() {
  if(!_payload) { toast('Nessun payload', false); return; }
  // Salva sempre in locale come backup
  sessionStorage.setItem('demolisci_righe', JSON.stringify(_righe));
  // Calcola dem_ids (ordinato) come chiave univoca
  var demIds = (_payload.demolizioni||[]).map(function(d){return d.id;}).sort(function(a,b){return a-b;}).join(',');
  var dataTratt = document.getElementById('b-data').value;
  try {
    var res = await fetch('/api/schede-demolizione', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        dem_ids: demIds,
        data_trattamento: dataTratt,
        peso_eff_tot:      parseFloat(_payload.pesoEffTot||0),
        peso_ricambi_tot:  parseFloat(_payload.ricambiTot||0),
        peso_netto_tot:    parseFloat(_payload.pesoNettoTot||0),
        righe_json: JSON.stringify(_righe)
      })
    });
    var r = await res.json();
    if(r.ok) {
      toast(r.action==='update' ? '\u2705 Scheda aggiornata nel DB' : '\u2705 Scheda salvata nel DB');
      _schedaId = r.id;
    } else {
      // Fallback: solo locale
      toast('\u26a0\ufe0f Salvato solo in locale: ' + (r.msg||''), false);
    }
  } catch(e) {
    toast('\u26a0\ufe0f Salvato solo in locale (server non raggiungibile)', false);
  }
}

init();

function stampa() {
  // Costruisci area di stampa
  var dems = _payload ? _payload.demolizioni : [];
  dems.sort(function(a,b){ return (a.data_presa_in_carico||'') > (b.data_presa_in_carico||'') ? 1 : -1; });
  var fmtData = function(d){ return d ? d.slice(0,10).split('-').reverse().join('/') : ''; };
  var prima = dems.length>0 ? dems[0] : {};
  var ultima = dems.length>0 ? dems[dems.length-1] : {};
  var dataTratt = document.getElementById('b-data').value;
  var dataTrattFmt = dataTratt ? dataTratt.split('-').reverse().join('/') : fmtData(new Date().toISOString());

  var titolo = 'TRATTAMENTO DEL ' + dataTrattFmt
    + ' DAL ' + fmtData(prima.data_presa_in_carico)
    + ' DEL NUM PROGRESSIVO ' + (prima.pag_reg||'—')
    + ' AL ' + fmtData(ultima.data_presa_in_carico)
    + ' DEL NUMERO PROGRESSIVO ' + (ultima.pag_reg||'—');

  // Sincronizza valori DOM->array prima di stampare
  _righe.forEach(function(r){
    var tr = document.getElementById('tr-'+r.id);
    if(!tr) return;
    tr.querySelectorAll('input[type=number][step="0.01"]').forEach(function(inp){
      if(inp.placeholder==='0.00') r.qtaSmaltire = inp.value;
    });
    tr.querySelectorAll('input[placeholder="es. HP14"]').forEach(function(inp){
      r.pericolosita = inp.value;
      if(inp.value && r.codice) _salvaPericByRiga(r);
    });
    tr.querySelectorAll('input[placeholder="es. 547"]').forEach(function(inp){
      r.albatros = inp.value;
    });
  });
  var righeValide = _righe.filter(function(r){ return r.descrizione; });
  var righeHtml = righeValide.map(function(r){
    var pN = parseFloat((_payload&&_payload.pesoNettoTot)||0);
    var qC = (parseFloat(r.percentuale)||0)>0 ? (pN*(parseFloat(r.percentuale)||0)/100) : 0;
    var qOut = (r.qtaSmaltire!==''&&r.qtaSmaltire!=null&&r.qtaSmaltire!==undefined)
      ? parseFloat(r.qtaSmaltire).toFixed(2) : (qC>0?qC.toFixed(2):'');
    var peric = r.pericolosita || _leggiPericolosita(r.codice);
    return '<tr>'
      +'<td>'+esc(r.descrizione)+'</td>'
      +'<td style="text-align:center;font-weight:700">'+esc(r.codice)+'</td>'
      +'<td style="text-align:right">'+qOut+'</td>'
      +'<td style="text-align:center">'+esc(peric)+'</td>'
      +'<td style="text-align:center">'+esc(r.albatros||'')+'</td>'
      +'</tr>';
  }).join('');

  var totSmalt = _righe.reduce(function(s,r){
    var pN2 = parseFloat((_payload&&_payload.pesoNettoTot)||0);
    var qC2 = (parseFloat(r.percentuale)||0)>0?(pN2*(parseFloat(r.percentuale)||0)/100):0;
    var q = (r.qtaSmaltire!==''&&r.qtaSmaltire!=null)?parseFloat(r.qtaSmaltire):qC2;
    return s+(q||0);
  },0);

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>'
    +'body{font-family:Arial,sans-serif;font-size:11px;margin:20px}'
    +'.titolo{font-size:13px;font-weight:700;color:#c8a000;text-transform:uppercase;text-align:center;margin-bottom:16px;line-height:1.4}'
    +'table{width:100%;border-collapse:collapse;margin-bottom:14px}'
    +'th{background:#f5f5f5;border:1px solid #ccc;padding:5px 7px;font-size:10px;text-align:left}'
    +'td{border:1px solid #ccc;padding:4px 7px;font-size:11px}'
    +'.tot{font-weight:700;font-size:12px;margin:8px 0}'
    +'</style></head><body>'
    +'<div class="titolo">'+titolo+'</div>'
    +'<table>'
    +'<thead><tr>'
    +'<th>Descrizione rifiuto</th>'
    +'<th style="width:70px;text-align:center">Codice Rifiuto</th>'
    +'<th style="width:90px;text-align:right">Q.tà da Smaltire</th>'
    +'<th style="width:120px;text-align:center">Classi di Pericolosità</th>'
    +'<th style="width:80px;text-align:center">N. Albatros</th>'
    +'</tr></thead>'
    +'<tbody>'+righeHtml+'</tbody>'
    +'</table>'
    +'<div class="tot">TOTALE AUTO = '+(_payload ? _payload.demolizioni.length : 0)+'</div>'
    +'<div class="tot" style="color:#c8a000">PESO TOTALE = '+fmt(_payload ? _payload.pesoEffTot : 0)+' KG</div>'
    +'<div class="tot" style="color:#16a34a">PESO TOTALE CARICATO = KG '+fmt(_payload ? _payload.pesoNettoTot : 0)+'</div>'
    +'<div style="text-align:right;font-size:8px;color:#9ca3af;font-style:italic;margin-top:40px;padding-top:6px;border-top:1px solid #e5e7eb">'    +'PerilCar ERP &copy; Dott. Ing. Carmine Perillo &mdash; Documento generato automaticamente'    +'</div>'    +'</body></html>';

  // Riepilogo trattamenti completi e 1° trattamenti
  var demsC  = _payload.demolizioniComplete     || [];
  var demsP  = _payload.demolizioniPrimoTratt   || [];
  var fmtN   = function(n){ return parseFloat(n||0).toFixed(2); };

  var riepilogoHtml = '';

  // Sezione trattamenti completi
  if(demsC.length > 0) {
    riepilogoHtml += '<div style="margin-top:16px;border-top:2px solid #333;padding-top:10px">'
      +'<div style="font-weight:700;font-size:12px;margin-bottom:6px">TRATTAMENTI COMPLETI: '+demsC.length+' AUTO</div>';
    demsC.forEach(function(d){
      riepilogoHtml += '<div style="font-size:11px;margin-bottom:2px">'
        +'Pag.Reg. <b>'+(d.pag_reg||'—')+'</b> — '+(d.veicolo_str||'—')
        +' — Peso eff.: <b>'+fmtN(d.peso_effettivo_kg)+' Kg</b>'
        +' — Peso netto: <b>'+fmtN(d.peso_netto_kg)+' Kg</b>'
        +'</div>';
    });
    var totEffC   = demsC.reduce(function(s,d){ return s+(parseFloat(d.peso_effettivo_kg)||0); },0);
    var totNettoC = demsC.reduce(function(s,d){ return s+(parseFloat(d.peso_netto_kg)||0); },0);
    riepilogoHtml += '<div style="font-weight:700;margin-top:6px;color:#c8a000">'
      +'TOTALE COMPLETI — Peso effettivo: '+fmtN(totEffC)+' Kg | Peso netto: '+fmtN(totNettoC)+' Kg'
      +'</div></div>';
  }

  // Sezione 1° trattamenti
  if(demsP.length > 0) {
    riepilogoHtml += '<div style="margin-top:14px;border-top:2px solid #f59e0b;padding-top:10px">'
      +'<div style="font-weight:700;font-size:12px;color:#92400e;margin-bottom:6px">1° TRATTAMENTI: '+demsP.length+' AUTO</div>';
    demsP.forEach(function(d){
      riepilogoHtml += '<div style="font-size:11px;margin-bottom:2px;color:#78350f">'
        +'Pag.Reg. <b>'+(d.pag_reg||'—')+'</b> — '+(d.veicolo_str||'—')
        +' — Peso eff.: <b>'+fmtN(d.peso_effettivo_kg)+' Kg</b>'
        +' (solo voci: oli, batterie, filtri, pastiglie, liquidi)'
        +'</div>';
    });
    var totEffP   = demsP.reduce(function(s,d){ return s+(parseFloat(d.peso_effettivo_kg)||0); },0);
    var totNettoP = demsP.reduce(function(s,d){ return s+(parseFloat(d.peso_netto_kg)||0); },0);
    riepilogoHtml += '<div style="font-weight:700;margin-top:6px;color:#92400e">'
      +'TOTALE 1° TRATT. — Peso effettivo: '+fmtN(totEffP)+' Kg | Peso netto: '+fmtN(totNettoP)+' Kg'
      +'</div></div>';
  }

  // Calcolo finale
  var totEffAll   = parseFloat(_payload.pesoEffTot||0);
  var totNettoAll = parseFloat(_payload.pesoNettoTot||0);
  riepilogoHtml += '<div style="margin-top:16px;border-top:3px solid #333;padding-top:12px">'
    +'<div style="font-size:13px;font-weight:700;color:#c8a000">PESO TOTALE = '+fmtN(totEffAll)+' KG</div>'
    +'<div style="font-size:13px;font-weight:700;color:#16a34a;margin-top:4px">PESO TOTALE CARICATO = '+fmtN(totNettoAll)+' KG</div>'
    +'<div style="font-size:12px;font-weight:700;margin-top:4px">TOTALE AUTO = '+(_payload.demolizioni||[]).length+'</div>'
    +'</div>';

  html = html.replace('</body></html>', riepilogoHtml + '</body></html>');

  var w = window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 500);
}
</script>
