<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Inventario — PerilCar</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#e94c00;--green:#16a34a;--yellow:#d97706;--text:#111827;--text2:#4b5563;--text3:#9ca3af;--border:#dde1e8;--bg:#f7f8fa;--radius:14px;--font:'DM Sans',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column}
.hdr{background:var(--orange);color:#fff;padding:max(env(safe-area-inset-top),12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-logo{font-weight:800;font-size:17px}.hdr-logo span{opacity:.75}
.hdr-right{text-align:right}
.hdr-sess{font-size:11px;opacity:.85;max-width:180px;line-height:1.3}
.hdr-prog{font-size:13px;font-weight:700;opacity:.9}
.prog-bar{height:4px;background:rgba(255,255,255,.3);flex-shrink:0}
.prog-fill{height:100%;background:#fff;transition:width .4s;border-radius:0 2px 2px 0}
.stats{display:flex;background:rgba(200,50,0,.9);flex-shrink:0}
.stat{flex:1;text-align:center;padding:6px 0;border-right:1px solid rgba(255,255,255,.2)}
.stat:last-child{border:none}
.stat-n{font-size:16px;font-weight:800;color:#fff;line-height:1}
.stat-l{font-size:9px;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.4px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 8px}
.card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.card-sec{padding:14px 16px;border-bottom:1px solid #f3f4f6}
.card-sec:last-child{border:none}
.pezzo-cod{font-size:11px;font-weight:700;color:var(--orange);font-family:monospace;margin-bottom:3px}
.pezzo-nome{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:10px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-item{background:var(--bg);border-radius:8px;padding:8px 10px}
.info-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.info-val{font-size:13px;font-weight:600}
.foto-ex-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.foto-ex{width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;border:2px solid var(--border)}
.no-foto{font-size:12px;color:var(--text3);padding:4px 0}
.qty-row{display:flex;align-items:center;gap:12px}
.qty-lbl{font-size:13px;font-weight:700;color:var(--text2);flex:1}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qbtn{width:40px;height:40px;border-radius:50%;border:none;font-size:22px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.qbtn.m{background:#fee2e2;color:#dc2626}
.qbtn.p{background:#f0fdf4;color:var(--green)}
.qinput{width:64px;text-align:center;font-size:22px;font-weight:800;border:2px solid var(--border);border-radius:10px;padding:6px 4px;font-family:monospace;outline:none}
.qinput:focus{border-color:var(--orange)}
.qty-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:5px}
.foto-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.foto-hdr span{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.foto-grid{display:flex;flex-wrap:wrap;gap:8px}
.foto-thumb-wrap{position:relative}
.foto-thumb{width:80px;height:80px;object-fit:cover;border-radius:10px;border:2px solid var(--border)}
.foto-del{position:absolute;top:-7px;right:-7px;background:#dc2626;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.foto-add{width:80px;height:80px;border-radius:10px;border:2px dashed var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.foto-add:active{background:#f0fdf4;border-color:var(--green)}
.foto-add .ico{font-size:26px;margin-bottom:2px}
.foto-add .lbl{font-size:10px;color:var(--text3);font-weight:600}
.foto-hint{font-size:11px;color:var(--text3);margin-top:8px}
textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:var(--font);font-size:14px;color:var(--text);resize:none;outline:none}
textarea:focus{border-color:var(--orange)}
.azioni{flex-shrink:0;padding:10px 14px max(env(safe-area-inset-bottom),10px);background:#fff;border-top:2px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn-conf{width:100%;padding:18px;border:none;border-radius:var(--radius);font-size:17px;font-weight:800;font-family:var(--font);cursor:pointer;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
.btn-conf:active{background:#15803d;transform:scale(.97)}
.btn-conf.busy{background:#9ca3af;pointer-events:none}
.btn-rim{width:100%;padding:13px;border:2px solid #fde68a;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;background:#fffbeb;color:var(--yellow);-webkit-tap-highlight-color:transparent}
.btn-rim:active{background:#fef3c7}
.schermata{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 20px;gap:14px;min-height:60vh}
.s-ico{font-size:60px}
.s-titolo{font-size:21px;font-weight:800}
.s-sub{font-size:14px;color:var(--text2);line-height:1.5;max-width:280px}
.sess-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:2px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.sess-card:active{background:#fff8f5;border-color:var(--orange)}
#net-bar.online{background:#16a34a;color:#fff}
#net-bar.offline{background:#dc2626;color:#fff}
#net-bar.pending{background:#d97706;color:#fff}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 20px;border-radius:30px;font-weight:700;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);font-size:14px;pointer-events:none}
.t-ok{background:var(--green);color:#fff}.t-err{background:#dc2626;color:#fff}.t-warn{background:var(--yellow);color:#fff}
.cam-ov{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column}
.cam-ov.hidden{display:none}
.cam-ov video{flex:1;object-fit:cover;width:100%}
.cam-btns{padding:16px;display:flex;gap:10px;justify-content:center;background:#000;padding-bottom:max(env(safe-area-inset-bottom),16px)}
.cam-btn{padding:14px 28px;border-radius:12px;border:none;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer}
canvas{display:none}
input[type=file]{display:none}

/* Barra cerca */
.cerca-bar{flex-shrink:0;padding:8px 12px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.cerca-inp{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);outline:none;background:var(--bg)}
.cerca-inp:focus{border-color:var(--orange)}
.cerca-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cerca-btn.active{background:var(--orange);border-color:var(--orange)}

/* Lista risultati cerca */
.cerca-results{position:fixed;inset:0;z-index:300;background:#fff;display:flex;flex-direction:column}
.cerca-results.hidden{display:none}
.cerca-results-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff}
.cerca-results-hdr input{flex:1;padding:9px 12px;border:1.5px solid var(--orange);border-radius:10px;font-size:14px;font-family:var(--font);outline:none}
.cerca-list{flex:1;overflow-y:auto}
.cerca-item{padding:12px 16px;border-bottom:1px solid #f3f4f6;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cerca-item:active{background:#fff8f5}
.cerca-item-nome{font-size:14px;font-weight:700;margin-bottom:2px}
.cerca-item-sub{font-size:11px;color:var(--text3);display:flex;gap:8px}
.cerca-item-qty{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:auto}
.qty-ok{background:#f0fdf4;color:var(--green)}
.qty-zero{background:#f9fafb;color:var(--text3)}
.cerca-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* Pannello impostazioni */
.settings-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.5);display:flex;align-items:flex-end}
.settings-ov.hidden{display:none}
.settings-panel{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(env(safe-area-inset-bottom),20px);max-height:80vh;overflow-y:auto}
.settings-titolo{font-size:17px;font-weight:800;margin-bottom:4px}
.settings-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.campo-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3f4f6}
.campo-row:last-child{border:none}
.campo-nome{font-size:14px;font-weight:600}
.campo-desc{font-size:11px;color:var(--text3);margin-top:1px}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#dde1e8;border-radius:26px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.toggle-slider{background:var(--orange)}
input:checked+.toggle-slider:before{transform:translateX(18px)}
.fase-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--yellow);font-weight:600;margin-bottom:10px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">Peril<span>Car</span> 📋</div>
  <div class="hdr-right" style="display:flex;align-items:center;gap:10px">
    <div>
      <div class="hdr-sess" id="hdr-sess">Inventario</div>
      <div class="hdr-prog" id="hdr-prog"></div>
    </div>
    <button onclick="apriCerca()" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:10px;padding:7px 10px;font-size:17px;cursor:pointer;-webkit-tap-highlight-color:transparent">🔍</button>
    <button onclick="apriImpostazioni()" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:10px;padding:7px 10px;font-size:17px;cursor:pointer;-webkit-tap-highlight-color:transparent">⚙️</button>
  </div>
</div>
<div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="s-conf">0</div><div class="stat-l">✅ Fatti</div></div>
  <div class="stat"><div class="stat-n" id="s-risc">0</div><div class="stat-l">⏳ Risc.</div></div>
  <div class="stat"><div class="stat-n" id="s-tot">0</div><div class="stat-l">📦 Tot.</div></div>
</div>

<!-- BARRA CERCA -->
<div class="cerca-bar" id="cerca-bar" style="display:none">
  <input class="cerca-inp" id="cerca-inp" placeholder="Cerca per nome o codice..." 
    oninput="cercaFiltра(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="cerca-btn active" onclick="chiudiCerca()">✕</button>
</div>

<!-- LISTA RISULTATI CERCA -->
<div class="cerca-results hidden" id="cerca-results">
  <div class="cerca-results-hdr">
    <input id="cerca-inp2" placeholder="Cerca per nome o codice..." 
      oninput="cercaFiltра(this.value)" autocomplete="off" autocorrect="off" autofocus>
    <button onclick="chiudiCerca()" style="padding:8px 14px;border:none;border-radius:10px;background:#fee2e2;color:#dc2626;font-weight:700;cursor:pointer;font-size:14px">✕ Chiudi</button>
  </div>
  <div class="cerca-list" id="cerca-list"></div>
</div>

<!-- BARRA STATO RETE -->
<div id="net-bar" style="display:none;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;flex-shrink:0">
  <span id="net-label">🟢 Online</span>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="net-queue" style="display:none;background:rgba(255,255,255,.3);padding:2px 8px;border-radius:20px;font-size:11px"></span>
    <button id="btn-sync" onclick="sincronizzaOra()" style="display:none;padding:5px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:#d97706">↑ Sincronizza ora</button>
  </div>
</div>

<div class="scroll" id="scroll-area">
  <div class="schermata"><div class="spinner"></div></div>
</div>
<div class="azioni" id="azioni" style="display:none">
  <button class="btn-conf" id="btn-conf" onclick="azioneConferma()">
    <span>✅</span><span id="btn-conf-lbl">Conferma</span>
  </button>
  <button class="btn-rim" onclick="azioneRimanda()">⏳ Rimanda — rivedi alla fine</button>
</div>
<div class="cam-ov hidden" id="cam-ov">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div class="cam-btns">
    <button class="cam-btn" style="background:var(--orange);color:#fff;flex:1" onclick="scattaFoto()">📸 Scatta</button>
    <button class="cam-btn" style="background:#333;color:#fff" onclick="chiudiCamera()">✕</button>
  </div>
</div>
<input type="file" id="inp-file" accept="image/*" multiple onchange="fotoGalleria(this)">
<input type="file" id="inp-camera" accept="image/*" capture="environment" onchange="fotoCameraCapture(this)">

<!-- Pannello impostazioni -->
<div class="settings-ov hidden" id="settings-ov" onclick="if(event.target===this)chiudiImpostazioni()">
  <div class="settings-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="settings-titolo">⚙️ Campi da mostrare</div>
      <button onclick="chiudiImpostazioni()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3)">×</button>
    </div>
    <div class="settings-sub">Seleziona le informazioni che vuoi vedere per ogni pezzo</div>
    <div id="campi-list"></div>
    <button onclick="chiudiImpostazioni()" style="width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;background:var(--orange);color:#fff;font-size:16px;font-weight:700;cursor:pointer">Salva e chiudi</button>
  </div>
</div>

<script>
const _sock=io();
const _p=new URLSearchParams(window.location.search);
const _sessId=parseInt(_p.get('sessione'))||null;
var _riga=null,_qty=0,_fotoNuove=[],_camStream=null,_stats={},_fase='principale';

// ── CACHE PEZZI LOCALE ────────────────────────────────────────────────
var PEZZI_KEY = 'inv_pezzi_'+(_sessId||'x');
var IDX_KEY   = 'inv_idx_'  +(_sessId||'x');

function pezziSalva(lista){ try{ localStorage.setItem(PEZZI_KEY, JSON.stringify(lista)); }catch(e){} }
function pezziLeggi(){ try{ return JSON.parse(localStorage.getItem(PEZZI_KEY)||'null'); }catch(e){ return null; } }
function idxSalva(i){ try{ localStorage.setItem(IDX_KEY, String(i)); }catch(e){} }
function idxLeggi(){ try{ return parseInt(localStorage.getItem(IDX_KEY)||'0')||0; }catch(e){ return 0; } }

var _pezziLocali = null;   // tutti i pezzi scaricati
var _idxCorrente = 0;      // indice corrente

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,tipo){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const d=document.createElement('div');d.className='toast t-'+(tipo||'ok');d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2500);
}
async function api(url,opts){
  opts=opts||{};opts.headers={'Content-Type':'application/json',...(opts.headers||{})};
  return (await fetch(url,opts)).json();
}

// Ordinamento: sospesi > rimandati, qty>0 > qty=0, poi ordine
function ordinaPezzi(a,b){
  if(a.stato!==b.stato) return a.stato==='sospeso'?-1:1;
  var qa=a.qty_attesa||0, qb=b.qty_attesa||0;
  if(qa>0 && qb===0) return -1;
}

async function init(){
  avviaPing(); // ping ogni 5s per rilevare connessione al server
  await new Promise(function(r){setTimeout(r,700);}); // aspetta primo ping
  aggiornaNetBar();
  if(!_sessId){ await mostraListaSessioni(); return; }

  // Prova a caricare pezzi dalla cache locale
  _pezziLocali = pezziLeggi();
  _idxCorrente = idxLeggi();

  if(_isOnline){
    // Online: scarica TUTTI i pezzi della sessione e li salva in locale
    mostraCaricamento('📥 Caricamento pezzi in corso...');
    try{
      var data = await api('/api/inventario/sessioni/'+_sessId);
      if(!data.ok){ mostraScherm('⚠️','Sessione non trovata','Controlla il link.'); return; }
      if(data.sessione.stato==='chiusa'){ mostraScherm('🔒','Sessione chiusa','Il responsabile ha chiuso questa sessione.'); return; }
      document.getElementById('hdr-sess').textContent = data.sessione.nome;

      // Scarica tutte le righe della sessione
      var righe = data.righe || [];
      // Tieni solo quelle non ancora completate (sospese o rimAndate)
      var daFare = righe.filter(function(r){ return r.stato==='sospeso'||r.stato==='rimandato'; });
      // Metti prima i sospesi, poi i rimandati
      daFare.sort(ordinaPezzi);
      _pezziLocali = daFare;
      _idxCorrente = 0;
      pezziSalva(_pezziLocali);
      idxSalva(0);

      // Aggiorna stats locali
      _stats.totale    = righe.length;
      _stats.confermati= righe.filter(function(r){return r.stato==='confermato';}).length;
      _stats.mancanti  = righe.filter(function(r){return r.stato==='mancante';}).length;
      _stats.rimandati = righe.filter(function(r){return r.stato==='rimandato';}).length;
      aggiornaStatsUI();

      _sock.emit('join_inventario',{sessione_id:_sessId});
      toast('✅ '+daFare.length+' pezzi caricati — puoi lavorare anche offline','ok');
    }catch(e){
      if(_pezziLocali){ toast('⚠️ Uso pezzi in cache locale','warn'); }
      else { mostraScherm('⚠️','Errore caricamento','Controlla la connessione.'); return; }
    }
  } else {
    // Offline: usa cache locale
    if(!_pezziLocali || _pezziLocali.length===0){
      mostraScherm('📴','Nessun dato in cache',
        'Devi accedere almeno una volta online per scaricare i pezzi. Connettiti al WiFi aziendale e ricarica la pagina.');
      return;
    }
    document.getElementById('hdr-sess').textContent = 'Inventario (offline)';
    toast('📴 Offline — lavori su '+_pezziLocali.length+' pezzi in cache','warn');
  }

  mostraPezzoCorrente();
}

function mostraCaricamento(msg){
  document.getElementById('scroll-area').innerHTML='<div class="schermata"><div class="spinner"></div><div class="s-sub">'+msg+'</div></div>';
  document.getElementById('azioni').style.display='none';
}

function aggiornaStatsUI(){
  var tot  = _stats.totale||1;
  var done = (_stats.confermati||0)+(_stats.mancanti||0);
  var pct  = Math.round(done/tot*100);
  var el=function(id){return document.getElementById(id);};
  if(el('s-conf')) el('s-conf').textContent=done;
  if(el('s-risc')) el('s-risc').textContent=_stats.rimandati||0;
  if(el('s-tot'))  el('s-tot').textContent=_stats.totale||0;
  if(el('prog-fill')) el('prog-fill').style.width=pct+'%';
  if(el('hdr-prog'))  el('hdr-prog').textContent=pct+'% completato';
}

async function aggStats(){
  if(_isOnline){
    try{
      var s=await api('/api/inventario/sessioni/'+_sessId+'/stats');
      _stats=s;
    }catch(e){}
  }
  aggiornaStatsUI();
}

function mostraPezzoCorrente(){
  _fotoNuove=[];
  document.getElementById('azioni').style.display='none';

  if(!_pezziLocali || _pezziLocali.length===0){
    mostraCompletato(); return;
  }

  // Cerca il prossimo pezzo non ancora fatto (nella coda locale)
  // Un pezzo è "fatto" se è nella coda come aggiorna_riga con stato confermato/rimandato
  var coda = codaLeggi();
  var righeGiaFatte = {};
  coda.forEach(function(op){
    if(op.tipo==='aggiorna_riga' && op.stato!=='rimandato') righeGiaFatte[op.rigaId]=true;
  });

  var pezzo = null;
  for(var i=_idxCorrente; i<_pezziLocali.length; i++){
    if(!righeGiaFatte[_pezziLocali[i].id]){
      pezzo = _pezziLocali[i];
      _idxCorrente = i;
      idxSalva(i);
      break;
    }
  }

  if(!pezzo){
    // Controlla rimandati
    var rimandati = coda.filter(function(op){ return op.tipo==='aggiorna_riga' && op.stato==='rimandato'; });
    if(rimandati.length>0){
      // Trova il pezzo rimandato nella lista locale
      var rimId = rimandati[0].rigaId;
      pezzo = _pezziLocali.find(function(p){ return p.id===rimId; });
      if(pezzo) _fase='rimandati';
    }
  }

  if(!pezzo){ mostraCompletato(); return; }

  _riga = pezzo;
  _qty  = _riga.qty_attesa||0;
  _fase = _fase||'principale';
  renderP();
  document.getElementById('azioni').style.display='flex';
}

// Mantieni prossimoP come alias
async function prossimoP(){
  _fotoNuove=[];
  if(_isOnline && _pezziLocali){
    // Aggiorna la lista locale dal server (rimuovi i pezzi già confermati)
    try{
      var data = await api('/api/inventario/sessioni/'+_sessId);
      if(data.ok && data.righe){
        var daFare = data.righe.filter(function(r){ return r.stato==='sospeso'||r.stato==='rimandato'; });
        daFare.sort(ordinaPezzi);
        _pezziLocali = daFare;
        _idxCorrente = 0;
        pezziSalva(_pezziLocali);
        idxSalva(0);
        _stats.confermati = data.righe.filter(function(r){return r.stato==='confermato';}).length;
        _stats.mancanti   = data.righe.filter(function(r){return r.stato==='mancante';}).length;
        _stats.rimandati  = data.righe.filter(function(r){return r.stato==='rimandato';}).length;
        _stats.totale     = data.righe.length;
        aggiornaStatsUI();
      }
    }catch(e){}
  }
  mostraPezzoCorrente();
}

// Chiamata quando arriva un file (da fotocamera o galleria)
function riceviFile(file){
  if(!_riga){ toast('Nessun pezzo attivo','err'); return; }
  var rigaId = _riga.id; // cattura subito prima di qualsiasi await
  var url = URL.createObjectURL(file);
  var id  = 'foto-'+Date.now()+'-'+Math.random().toString(36).slice(2);
  _fotoNuove.push({file:file, nome:file.name, id:id, url:url, caricata:false, rigaId:rigaId});
  aggiungiAnteprima(id, url);
  updFotoCount();
  uploadFoto(file, file.name, id, rigaId);
}

function aggiungiAnteprima(id, url){
  var grid = document.getElementById('foto-grid');
  if(!grid){ console.warn('foto-grid non trovata'); return; }
  var hint = document.getElementById('foto-hint');
  if(hint) hint.style.display = 'none';
  var wrap = document.createElement('div');
  wrap.className = 'foto-thumb-wrap';
  wrap.id = 'wrap-'+id;
  var img = document.createElement('img');
  img.className = 'foto-thumb';
  img.src = url;
  img.style.opacity = '0.5';
  img.id = 'img-'+id;
  img.onclick = function(){ window.open(url,'_blank'); };
  var spinner = document.createElement('div');
  spinner.id = 'spin-'+id;
  spinner.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:10px;font-size:18px';
  spinner.textContent = '⏳';
  wrap.appendChild(img);
  wrap.appendChild(spinner);
  grid.appendChild(wrap);
}



function updFotoCount(){
  var el = document.getElementById('foto-count');
  if(!el) return;
  var n = _fotoNuove.length;
  var c = _fotoNuove.filter(function(f){return f.caricata;}).length;
  el.textContent = c+'/'+n+' foto salvate';
}

// Carica preferenze dal localStorage
var _campiAttivi = JSON.parse(localStorage.getItem('inv_campi') || 'null') ||
  ['marca','modello','categoria','colore','anno_da'];

function apriImpostazioni(){
  var list = document.getElementById('campi-list');
  // Raggruppa per gruppo
  var gruppi = {};
  CAMPI_DISPONIBILI.forEach(function(c){
    var g = c.gruppo || 'Altro';
    if(!gruppi[g]) gruppi[g] = [];
    gruppi[g].push(c);
  });
  var html = '';
  Object.keys(gruppi).forEach(function(g){
    html += '<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 6px">'+g+'</div>';
    gruppi[g].forEach(function(c){
      var checked = _campiAttivi.includes(c.key) ? 'checked' : '';
      html += '<div class="campo-row">'
        +'<div><div class="campo-nome">'+c.label+'</div><div class="campo-desc">'+c.desc+'</div></div>'
        +'<label class="toggle">'
        +'<input type="checkbox" '+checked+' data-k="'+c.key+'" onchange="toggleCampo(this.dataset.k,this.checked)">'
        +'<span class="toggle-slider"></span>'
        +'</label>'
        +'</div>';
    });
  });
  list.innerHTML = html;
  document.getElementById('settings-ov').classList.remove('hidden');
}

function chiudiImpostazioni(){
  document.getElementById('settings-ov').classList.add('hidden');
  localStorage.setItem('inv_campi', JSON.stringify(_campiAttivi));
  // Ri-renderizza se c'è un pezzo attivo
  if(_riga) renderP();
}

function toggleCampo(key, attivo){
  if(attivo){ if(!_campiAttivi.includes(key)) _campiAttivi.push(key); }
  else { _campiAttivi = _campiAttivi.filter(function(k){return k!==key;}); }
}


// ══════════════════════════════════════════════════════════════════════
// SISTEMA OFFLINE — coda locale con localStorage
// ══════════════════════════════════════════════════════════════════════

var _isOnline    = false; // True solo se il server è raggiungibile
var _pingInterval = null;
var _syncInCorso = false;
var CODA_KEY     = 'inv_coda_' + (_sessId || 'x');

// ── Coda operazioni ───────────────────────────────────────────────────
function codaLeggi(){
  try{ return JSON.parse(localStorage.getItem(CODA_KEY)||'[]'); }
  catch(e){ return []; }
}
function codaScrivi(coda){
  try{ localStorage.setItem(CODA_KEY, JSON.stringify(coda)); }
  catch(e){ console.warn('localStorage pieno:', e); }
}
function codaAggiungi(op){
  var coda = codaLeggi();
  coda.push({...op, ts: Date.now()});
  codaScrivi(coda);
  aggiornaNetBar();
}
function codaRimuovi(ts){
  var coda = codaLeggi().filter(function(o){ return o.ts !== ts; });
  codaScrivi(coda);
  aggiornaNetBar();
}

// ── UI barra rete ─────────────────────────────────────────────────────
function aggiornaNetBar(){
  var bar    = document.getElementById('net-bar');
  var label  = document.getElementById('net-label');
  var queue  = document.getElementById('net-queue');
  var btnSync= document.getElementById('btn-sync');
  if(!bar) return;

  var coda = codaLeggi();
  var n    = coda.length;

  bar.style.display = 'flex';

  if(!_isOnline){
    bar.className = 'offline';
    label.textContent = '🔴 Offline — le azioni vengono salvate in locale';
    queue.style.display  = n>0 ? 'inline' : 'none';
    queue.textContent    = n+' in coda';
    btnSync.style.display= 'none';
  } else if(n > 0){
    bar.className = 'pending';
    label.textContent = '🟡 Online — '+n+' operazioni da sincronizzare';
    queue.style.display  = 'inline';
    queue.textContent    = n+' in attesa';
    btnSync.style.display= 'inline';
  } else {
    bar.className = 'online';
    label.textContent = '🟢 Online';
    queue.style.display  = 'none';
    btnSync.style.display= 'none';
  }
}

// ── Sincronizzazione ──────────────────────────────────────────────────
async function sincronizzaOra(){
  if(_syncInCorso || !_isOnline) return;
  _syncInCorso = true;
  var btnSync = document.getElementById('btn-sync');
  if(btnSync) btnSync.textContent = '⏳ Sincronizzazione...';

  var coda = codaLeggi();
  var ok = 0, err = 0;

  for(var i=0; i<coda.length; i++){
    var op = coda[i];
    try{
      if(op.tipo === 'aggiorna_riga'){
        var r = await fetch('/api/inventario/righe/'+op.rigaId, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({stato:op.stato, qty_trovata:op.qty, note:op.note||''})
        });
        var res = await r.json();
        if(res.ok){ codaRimuovi(op.ts); ok++; }
        else { err++; console.warn('Sync errore:', res.msg); }

      } else if(op.tipo === 'upload_foto'){
        // Ricostruisci blob da base64
        var mime = op.b64.split(';')[0].split(':')[1]||'image/jpeg';
        var bin  = atob(op.b64.split(',')[1]);
        var arr  = new Uint8Array(bin.length);
        for(var j=0;j<bin.length;j++) arr[j]=bin.charCodeAt(j);
        var blob = new Blob([arr],{type:mime});
        var fd   = new FormData();
        fd.append('file', blob, op.nome);
        var r2 = await fetch('/api/inventario/righe/'+op.rigaId+'/foto', {method:'POST', body:fd});
        var res2 = await r2.json();
        if(res2.ok){ codaRimuovi(op.ts); ok++; }
        else { err++; }
      }
    }catch(e){
      err++;
      console.warn('Sync op fallita:', e);
    }
  }

  _syncInCorso = false;
  aggiornaNetBar();

  if(ok > 0 && err === 0){
    toast('✅ Sincronizzazione completata ('+ok+' operazioni)', 'ok');
    await aggStats();
  } else if(err > 0){
    toast('⚠️ '+ok+' OK, '+err+' errori — riprova', 'warn');
  }
}

// ── Override azioni per supporto offline ─────────────────────────────
// Sostituisce api() con versione offline-aware
async function apiOffline(url, opts){
  if(_isOnline){
    return api(url, opts);
  }
  // Offline: simula risposta OK e salva in coda
  return {ok: true, msg: 'Salvato offline', _offline: true};
}

// Versione offline di azioneConferma
async function azioneConferma(){
  if(!_riga) return;
  var rigaId = _riga.id; // cattura subito
  var btn    = document.getElementById('btn-conf');
  var lbl    = document.getElementById('btn-conf-lbl');
  btn.classList.add('busy'); lbl.textContent='Salvataggio...';
  var note = (document.getElementById('note-inp')||{}).value||'';
  var ubicazione = (document.getElementById('ubicazione-inp')||{}).value||'';

  if(_isOnline){
    // Upload foto già avvenuto in riceviFile, salva ubicazione se modificata
    if(ubicazione && ubicazione !== (_riga.ubicazione||'')){
      try{
        await api('/api/magazzino/componenti/'+_riga.componente_id,{
          method:'PUT', body:JSON.stringify({ubicazione:ubicazione})
        });
      }catch(e){}
    }
    var res = await api('/api/inventario/righe/'+rigaId,{
      method:'PUT',
      body:JSON.stringify({stato:'confermato', qty_trovata:_qty, note:note})
    });
    btn.classList.remove('busy'); lbl.textContent='Conferma';
    if(res.ok){
      // Rimuovi pezzo dalla lista locale
      if(_pezziLocali && _riga){
        _pezziLocali = _pezziLocali.filter(function(p){return p.id!==_riga.id;});
        pezziSalva(_pezziLocali);
        _idxCorrente = 0; idxSalva(0);
      }
      await aggStats(); setTimeout(prossimoP,300);
    }
    else toast(res.msg||'Errore','err');
  } else {
    // OFFLINE: salva in coda
    codaAggiungi({tipo:'aggiorna_riga', rigaId:rigaId, stato:'confermato', qty:_qty, note:note});
    // Salva TUTTE le foto non ancora caricate — ognuna separata in coda
    for(var i=0;i<_fotoNuove.length;i++){
      var f = _fotoNuove[i];
      if(!f.caricata && f.file){
        await new Promise(function(resolve){
          var fRef = f; // cattura riferimento
          var reader = new FileReader();
          reader.onload = function(e){
            codaAggiungi({
              tipo: 'upload_foto',
              rigaId: rigaId,
              b64: e.target.result,
              nome: fRef.nome,
              fotoId: fRef.id
            });
            resolve();
          };
          reader.readAsDataURL(fRef.file);
        });
      }
    }
    btn.classList.remove('busy'); lbl.textContent='Conferma';
    toast('💾 Salvato offline — sync quando torni online','warn');
    aggiornaNetBar();
    // Avanza al prossimo pezzo anche offline
    _idxCorrente++;
    idxSalva(_idxCorrente);
    setTimeout(mostraPezzoCorrente, 300);
  }
}

async function azioneRimanda(){
  if(!_riga) return;
  var rigaId = _riga.id;
  if(_isOnline){
    var res = await api('/api/inventario/righe/'+rigaId,{
      method:'PUT', body:JSON.stringify({stato:'rimandato', qty_trovata:_qty})
    });
    if(res.ok){ await aggStats(); setTimeout(prossimoP,300); }
    else toast(res.msg||'Errore','err');
  } else {
    codaAggiungi({tipo:'aggiorna_riga', rigaId:rigaId, stato:'rimandato', qty:_qty});
    toast('💾 Rimandato salvato offline','warn');
    aggiornaNetBar();
    _idxCorrente++;
    idxSalva(_idxCorrente);
    setTimeout(mostraPezzoCorrente, 300);
  }
}

// ── Upload foto offline-aware ─────────────────────────────────────────
async function uploadFoto(file, nome, id, rigaId){
  if(!rigaId){ toast('Nessun pezzo selezionato','err'); return; }
  if(!_isOnline){
    // Offline: segna come "da caricare" ma mostra anteprima
    var imgEl  = document.getElementById('img-'+id);
    var spinEl = document.getElementById('spin-'+id);
    var wrapEl = document.getElementById('wrap-'+id);
    if(spinEl) spinEl.textContent = '💾';
    // Salveremo in coda al Conferma
    _fotoNuove.forEach(function(f){ if(f.id===id){ f.caricata=false; } });
    toast('📴 Foto salvata — si caricherà al sync','warn');
    // Aggiungi tasto elimina
    if(wrapEl && imgEl){
      imgEl.style.opacity='0.7';
      var del=document.createElement('div'); del.className='foto-del'; del.textContent='×';
      del.onclick=function(){ _fotoNuove=_fotoNuove.filter(function(f){return f.id!==id;}); wrapEl.remove(); updFotoCount(); };
      wrapEl.appendChild(del);
    }
    updFotoCount();
    return;
  }
  // Online: upload normale
  try{
    var fd = new FormData(); fd.append('file', file, nome);
    var r  = await fetch('/api/inventario/righe/'+rigaId+'/foto', {method:'POST', body:fd});
    var res= await r.json();
    var imgEl  = document.getElementById('img-'+id);
    var spinEl = document.getElementById('spin-'+id);
    var wrapEl = document.getElementById('wrap-'+id);
    if(res.ok){
      if(imgEl){ imgEl.style.opacity='1'; imgEl.src=res.url; }
      if(spinEl) spinEl.remove();
      _fotoNuove.forEach(function(f){ if(f.id===id){ f.caricata=true; f.url=res.url; } });
      if(wrapEl){
        var del=document.createElement('div'); del.className='foto-del'; del.textContent='×';
        del.onclick=function(){
          _fotoNuove=_fotoNuove.filter(function(f){return f.id!==id;});
          wrapEl.remove(); updFotoCount();
        };
        wrapEl.appendChild(del);
      }
      toast('✅ Foto salvata!','ok');
    } else {
      if(spinEl) spinEl.textContent='❌';
      toast('Errore: '+(res.msg||''),'err');
    }
  }catch(e){
    var spinEl=document.getElementById('spin-'+id);
    if(spinEl) spinEl.textContent='❌';
    toast('Errore: '+e.message,'err');
  }
}


// ── Connettività basata su ping al server ────────────────────────────
async function pingServer(){
  try{
    var controller = new AbortController();
    var tid = setTimeout(function(){ controller.abort(); }, 2000);
    var r = await fetch("/api/ping", {cache:"no-cache", signal:controller.signal});
    clearTimeout(tid);
    var wasOffline = !_isOnline;
    _isOnline = r.ok;
    if(wasOffline && _isOnline){
      aggiornaNetBar();
      var n = codaLeggi().length;
      if(n>0) toast("🟢 Server raggiunto — "+n+" operazioni in coda","warn");
      else toast("🟢 Connesso al server","ok");
    }
  }catch(e){
    var wasOnline = _isOnline;
    _isOnline = false;
    if(wasOnline){ aggiornaNetBar(); toast("🔴 Server non raggiungibile","warn"); }
  }
  aggiornaNetBar();
}

function avviaPing(){
  pingServer();
  _pingInterval = setInterval(pingServer, 5000);
}


// ── RICERCA PEZZI ─────────────────────────────────────────────────────
function apriCerca(){
  if(!_pezziLocali||!_pezziLocali.length){
    toast('Nessun pezzo caricato','err'); return;
  }
  document.getElementById('cerca-results').classList.remove('hidden');
  cercaFiltра('');
  setTimeout(function(){ document.getElementById('cerca-inp2').focus(); }, 100);
}

function chiudiCerca(){
  document.getElementById('cerca-results').classList.add('hidden');
}

function cercaFiltра(q){
  // Sincronizza i due input
  var inp1 = document.getElementById('cerca-inp');
  var inp2 = document.getElementById('cerca-inp2');
  if(inp1 && document.activeElement===inp1) { if(inp2) inp2.value=q; }
  else { if(inp1) inp1.value=q; }

  var list = document.getElementById('cerca-list');
  if(!_pezziLocali){ list.innerHTML='<div class="cerca-empty">Nessun pezzo caricato</div>'; return; }

  q = q.toLowerCase().trim();
  var coda = codaLeggi();
  var fatti = {};
  coda.forEach(function(op){
    if(op.tipo==='aggiorna_riga') fatti[op.rigaId]=op.stato;
  });

  var risultati = _pezziLocali.filter(function(p){
    if(!q) return true;
    var nome = (p.articolo||'').toLowerCase();
    var cod  = (p.cmp||'').toLowerCase();
    var marc = (p.marca||'').toLowerCase();
    return nome.indexOf(q)>=0 || cod.indexOf(q)>=0 || marc.indexOf(q)>=0;
  });

  if(!risultati.length){
    list.innerHTML='<div class="cerca-empty">Nessun risultato per "'+q+'"</div>';
    return;
  }

  list.innerHTML = risultati.map(function(p){
    var stato = fatti[p.id]||p.stato;
    var qty   = p.qty_attesa||0;
    var statoLabel = stato==='confermato'?'✅':stato==='rimandato'?'⏳':'○';
    var hi = function(s){ 
      if(!q) return s;
      return s.replace(new RegExp('('+q.replace(/[\-\[\]{}()*+?.,\\^$|#]/g,'\\$&')+')','gi'),
        '<b style="color:var(--orange)">$1</b>');
    };
    return '<div class="cerca-item" onclick="selezionaPezzoId('+p.id+')">'
      +'<div class="cerca-item-nome">'+statoLabel+' '+hi(p.articolo||p.cmp||'—')+'</div>'
      +'<div class="cerca-item-sub">'
      +'<span>'+hi(p.cmp||'')+'</span>'
      +(p.marca?'<span>'+hi(p.marca)+'</span>':'')
      +(p.modello?'<span>'+p.modello+'</span>':'')
      +'<span class="cerca-item-qty '+(qty>0?'qty-ok':'qty-zero')+'">'+qty+' pz</span>'
      +'</div>'
      +'</div>';
  }).join('');
}

function selezionaPezzoId(id){
  if(!_pezziLocali) return;
  var idx = _pezziLocali.findIndex(function(p){ return p.id===id; });
  if(idx<0){ toast('Pezzo non trovato','err'); return; }
  _idxCorrente = idx;
  idxSalva(idx);
  chiudiCerca();
  _fotoNuove=[];
  _riga = _pezziLocali[idx];
  _qty  = _riga.qty_attesa||0;
  renderP();
  document.getElementById('azioni').style.display='flex';
  // Scroll in cima
  var scroll = document.getElementById('scroll-area');
  if(scroll) scroll.scrollTop=0;
}

init();
