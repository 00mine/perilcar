<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerilCar — Accesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f8fa; --surface: #ffffff; --border: #dde1e8;
      --orange: #e94c00; --orange2: #ff6b35;
      --blue: #3a5bd9; --green: #16a34a; --red: #dc2626;
      --text: #111827; --text2: #4b5563; --text3: #9ca3af;
      --font: 'DM Sans', system-ui, sans-serif;
    }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .wrap {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .logo h1 {
      font-size: 56px; font-weight: 700; letter-spacing: -3px;
      text-align: center; color: var(--text);
    }
    .logo h1 span { color: var(--orange); }
    .logo p { text-align: center; color: var(--text3); font-style: italic; font-size: 14px; margin-top: 2px; }

    .card {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
      display: flex; flex-direction: column; gap: 16px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-align: center; }
    label { font-size: 11.5px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 11px 14px; font-family: var(--font); font-size: 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--blue); background: #fff; }
    .btn-login {
      width: 100%; padding: 13px; background: var(--orange); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer; transition: background .15s;
    }
    .btn-login:hover { background: var(--orange2); }
    .err { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; font-weight: 500; }
    .footer-sig { font-size: 12px; color: var(--text3); font-style: italic; }
    #reload-badge {
      position: fixed; bottom: 14px; right: 14px;
      background: var(--green); color: #fff; padding: 5px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Peril<span>Car</span></h1>
    <p>Gestionale aziendale</p>
  </div>
  <div class="card">
    <p class="card-title">Accedi al sistema</p>
    <div>
      <label>Username</label>
      <input type="text" id="inp-user" autocomplete="username" placeholder="Username">
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="inp-pass" autocomplete="current-password" placeholder="Password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="err" id="err-msg"></div>
    <button class="btn-login" onclick="doLogin()">ENTRA</button>
  </div>
  <span class="footer-sig">Ing. Carmine Perillo</span>
</div>
<div id="reload-badge">🔄 Hot reload</div>
<script>
io().on('reload', () => {
  document.getElementById('reload-badge').style.opacity='1';
  setTimeout(()=>window.location.reload(), 400);
});
async function doLogin() {
  const u   = document.getElementById('inp-user').value.trim();
  const p   = document.getElementById('inp-pass').value;
  const err = document.getElementById('err-msg');
  err.textContent = '';
  if(!u||!p){ err.textContent='Inserisci username e password'; return; }
  const r    = await fetch('/api/login',{method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
  const data = await r.json();
  if(data.ok) window.location.href='/dashboard';
  else err.textContent='⚠ '+data.msg;
}
</script>
</body>
</html>
